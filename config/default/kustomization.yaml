apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opentalon-operator-system

commonLabels:
  app.kubernetes.io/name: opentalon-operator

resources:
  - ../manager
  - ../rbac
  - ../crd

# Patches applied to the manager Deployment.
patches:
  - path: manager_config_patch.yaml
    target:
      kind: Deployment
      name: opentalon-operator-controller-manager
